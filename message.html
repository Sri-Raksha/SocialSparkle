<html>

      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/framework7/1.6.5/css/framework7.material.colors.css">
      
          <!-- Path to your custom app icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
        rel="stylesheet"> 
        <link rel="stylesheet" href="./style.css">
        <style>


.item-media {
  margin: auto;
}

    </head>
    <body>
      <nav>
        <div class="container">
            <a href="index.html" class="log"><b>socialsparkle</b></a>
            <div class="search-bar">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                  </svg>
                <input type="search" placeholder="search for entrepreneurs">
            </div>
            <div class="create">
                <label class="btn btn-primary" for="create-post">Create</label>
                <div class="profile-photo">
                    <img src="./images/profile-1.jpg">
                </div>
            </div>
        </div>
    </nav>

      <!-- Status bar overlay for full screen mode (PhoneGap) -->
      <div class="statusbar-overlay"></div>
      <!-- Panels overlay-->
      <div class="panel-overlay"></div>
      <!-- Left panel with reveal effect-->
      <div class="panel panel-left panel-reveal">
        <div class="content-block">
          <p>Left panel content goes here</p>
        </div>
      </div>
      <!-- Views -->
      <div class="views">
        <!-- Your main view, should have "view-main" class -->
        <div class="view view-main">
          <!-- Pages container, because we use fixed-through navbar and toolbar, it has additional appropriate classes-->
          <div class="pages navbar-fixed ">
            <!-- Page, "data-page" contains page name -->
            <div data-page="index" class="page">            
                <!-- Top Navbar-->
                <div class="navbar">
                  <div class="navbar-inner">
  
                    <div class="left sliding">
  <div class="item-media" style="margin-left:10px; margin-top:10px">
                        <img src="img/pp.ico" width="44"></div>
                      <div class="item-inner" style="margin-left:10px">
                        <div class="item-title-row">
                          <div class="item-title" style="font-size:18px; line-height:23px">Anya</div>
                        </div>
                        <div class="item-subtitle" style="font-size:14px; line-height:15px">Urgo Medicals</div>
                      </div>
                      
                    </div>
                     
                    
                    <div class="right">
                      <!-- Right link contains only icon - additional "icon-only" class
                        Additional "open-panel" class tells app to open panel when we click on this link-->
                      <a href="#" class="link icon-only"><i class="material-icons">more_vert</i></a>
                    </div>
                  </div>
                </div>          
              
                <!-- messagebar -->
    <div class="toolbar messagebar">
      <div class="toolbar-inner">
        <textarea placeholder="Text here"></textarea><a href="#" class="link"><i class="material-icons color-blue">send</i></a>
      </div>
    </div>
              
                <div class="page-content messages-content">
   
  <div class="messages">
        <div class="messages-date">Sunday, Feb 9 <span>12:58</span></div>
        <div class="message message-sent">
          <div class="message-text">Hello</div>
        </div>
        <div class="message message-sent">
          <div class="message-text">How are you?</div>
        </div>
        <div class="message message-received">
          <div class="message-name">Anya</div>
          <div class="message-text">I am fine, thanks</div>
          <div style="background-image:url(http://lorempixel.com/output/people-q-c-100-100-9.jpg)" class="message-avatar"></div>

        <div class="message message-received">

        </div>
      </div>
          </div>
                 
   </div>

        </div>
