<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialSparkle.in</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
          box-sizing: border-box;
        }

        .column {
          float: left;
          width: 50%;
          padding: 10px;
          height: 97vh;
        }

        .row:after {
          content: "";
          display: table;
          clear: both;
          height: 70px;
        }

        .popup .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-150%) scale(0);
            width: 500px;
            height: 600px;
            z-index: 2;
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background: #262626;
            z-index: 1;
            }

            .popup .close-btn {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 30px;
            height: 30px;
            color: rgb(184, 40, 40);
            font-size: 30px;
            border-radius: 50%;
            padding: 2px 5px 7px 5px;
            cursor: pointer;
            }

            .popup.active .content {
            transition: all 300ms ease-in-out;
            transform: translate(-50%,-50%) scale(1);
            }

        .input-field .validate {
            padding: 20px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            color: rgb(12, 174, 120);
            background: #262626;
            box-shadow: inset 5px 5px 5px #232323, 
                        inset -5px -5px 5px #292929;
            outline: none;
            }    
            .fbutton{
                margin-top: 10%;
                margin-left: 40%;
                background-color: white;
                color: black;
            }
            .fbutton:hover{
                background-color: black;
                color: whitesmoke;
            }
            .third-button{
                background-color: white;
                color: black;
            }
            
            .third-button:hover{
                background-color: white;
                color: black;
            }

            .second-button {
            color: white;
            font-size: 18px;
            font-weight: 500;
            margin-top: 20px;
            margin-bottom: 20px;
            border-radius: 40px;
            border: none;
            background: #262626;
            box-shadow:  8px 8px 15px #202020, 
                        -8px -8px 15px #2c2c2c;
            transition: box-shadow .35s ease !important;
            outline: none;
            }

            .second-button:active{
            background: linear-gradient(145deg,#222222, #292929);
            box-shadow: 5px 5px 10px #262626, -5px -5px 10px #262626;
            border: none;
            outline: none;
            }

            .second-button:hover{
                background-color: white;
                color: black;
            }

            .icons{
                background-color: #ffffff00;
                margin-right: -260px;
                margin-left: 280px;
            }
            .text1{
                justify-content: center;
                font: "Times New Roman", Times, serif;
                color: white;
                /* margin-left: 50px; */
                text-align: center;
            }
            .gifc{
                margin-left: 50px;
                margin-right: 30px;
                width: 400px;
            }

            button{
                font-size:0.8rem;
                font-weight:700;
                outline:none;
                border:none;
                background-color:#1d1d1d;
                color:aliceblue;
                padding:25px 15px;
                cursor: pointer;
                text-transform:uppercase;
                transition: 00.3s ease;
            }

            @media screen and (max-width: 1200px) {
                .row {
                    width: 96%;
                }

            @media screen and (max-width: 992px) {
                .row {
                    width: 50%;
                }
            }
        }
    </style>
</head>
<body>
    <div class="row">
        <div class="column" style="background-color: rgb(255, 255, 255)">
          <img src="img/logo2.png" alt="" style="height: 800px; width: 700px; margin-right: 40px; margin-bottom: 10px; margin-left: 0px;" >
        </div>
        <div class="column" style="background-color:rgb(0, 0, 0);">
                <h1 class="text1">GET STARTED INTO THE WORLD OF OPPURTUNITES</h1>
                <img src="img/gif2.gif" alt="" class="gifc">
                <button onclick="togglePopup()" class="fbutton" data-modal="popup-1">Sign Up</button>
                <button onclick="togglePopup2()" class="third-button" data-modal="popup-2">Log In</button>
            <div class="popup" id="popup-1">
                <div class="content">
                <div class="close-btn" onclick="togglePopup()">×</div>
                    <h2 style="color: white; margin-bottom: 20px; margin-top: 20px;">Welcome To SocialSparkle</h2> 
                    <div class="input-field"><input type="email"  id="email" placeholder="Email" class="validate"></div>
                    <div class="input-field"><input type="text"  id="uname" placeholder="UserName" class="validate"></div>
                    <div class="input-field" ><input type="password" id="pwd" placeholder="Password" class="validate"></div>
                    <a href="index.html"><button class="second-button" type="submit"onclick="signup()">Sign Up</button></a> 
                    <p style="color: white;">Already a Member? <a href="popup-2" style="color: rgb(184, 40, 40);">Log In</a></p>
                </div>
            </div>
            <div class="popup" id="popup-2">
                <div class="content">
                <div class="close-btn" onclick="togglePopup2()">×</div>
                    <h2 style="color: white; margin-bottom: 20px; margin-top: 20px;">Welcome To SocialSparkle</h2> 
                    <div class="input-field"><input type="email" placeholder="Email" class="validate"></div>
                    <div class="input-field"><input type="password" placeholder="Password" class="validate"></div>
                    <a href="index.html"><button class="second-button" type="submit">Log In</button></a>
                    <p style="color: white;">Not on SocialSparkle Yet? <a href="home.html" style="color: rgb(184, 40, 40);">Log In</a></p>
                </div>
            </div>

              </svg></button>

            <button class="icons"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-twitter" viewBox="0 0 16 16">

              </svg></button>
        </div>
        
      </div>
      <script src="popup.js"></script>
</body>
</html>
